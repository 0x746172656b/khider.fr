server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Behind the TLS-terminating ingress, absolute redirects are built with
    # this server's scheme (http) and downgrade https clients. Emit relative
    # Location headers instead so the client keeps its original scheme.
    absolute_redirect off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'none'; style-src 'self'; img-src 'self' data:; base-uri 'none'; form-action 'none'; frame-ancestors 'self'" always;

    # Serve the site; unknown paths return 404 (static site, no SPA routing)
    location / {
        try_files $uri $uri/ =404;
    }

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Static site has no PHP; refuse these probes outright
    location ~ \.php$ {
        return 404;
    }

    # Long-lived caching for static assets
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Gzip
    gzip on;
    gzip_types text/css text/plain application/javascript image/svg+xml application/json;
    gzip_min_length 256;
}
